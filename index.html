<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZipFit · Find My Fit</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #272727;
    background: #E8E5DF;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }
  /* Quiz frame — fixed square; native scroll inside */
  #stage {
    width: 820px;
    height: 820px;
    max-width: 100%;
    max-height: calc(100vh - 48px);
    background: #fff;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 12px 48px rgba(0,0,0,.10);
    position: relative;
  }
  input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: rgba(39,39,39,.18); border-radius: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="stage">
  <div id="root"></div>
</div>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared data + recommendation -->
<script src="data.js"></script>
<script src="shared.jsx"></script>

<!-- V1 variant -->
<script type="text/babel" src="variant1.jsx"></script>

<!-- Mount the quiz directly into #root -->
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<window.QuizEditorial />);
</script>

</body>
</html>
